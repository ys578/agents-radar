name: Daily Agents Radar

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  HUSKY: 0

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run daily digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          DIGEST_REPO: ${{ github.repository }}
        run: pnpm start

      - name: Commit digest files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          if git diff --cached --quiet; then
            echo "No new digest files to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit --no-verify -m "digest: ${DATE} daily digest"
            git pull --rebase
            git push
          fi

      - name: Update web manifest
        run: pnpm manifest

      - name: Commit manifest and feed
        run: |
          git add manifest.json feed.xml
          if ! git diff --cached --quiet; then
            git commit --no-verify -m "chore: update manifest.json"
            git pull --rebase
            git push
          fi

      - name: Close stale issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST_REPO: ${{ github.repository }}
        run: pnpm close-stale
